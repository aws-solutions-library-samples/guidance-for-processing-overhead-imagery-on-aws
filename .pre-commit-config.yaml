repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        args: ["--line-length=125"]
        types: [file, python]

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
        args: ["--line-length=125", "--profile=black"]
        types: [file, python]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: ["--ignore=E203,W503,W605", "--max-line-length=125"]
        types: [file, python]

  - repo: local
    hooks:
      - id: eslint-osml-vpc
        name: ESLint (osml-vpc)
        entry: bash -c 'cd lib/osml-vpc/cdk && npx eslint . --ext .ts,.tsx --fix'
        language: system
        files: ^lib/osml-vpc/cdk/.*\.(ts|tsx)$
        exclude: (node_modules/|dist/|cdk\.out/)
        types: [file]
        pass_filenames: false

      - id: eslint-osml-apis
        name: ESLint (osml-apis)
        entry: bash -c 'cd lib/osml-apis/cdk && npx eslint . --ext .ts,.tsx --fix'
        language: system
        files: ^lib/osml-apis/cdk/.*\.(ts|tsx)$
        exclude: (node_modules/|dist/|cdk\.out/)
        types: [file]
        pass_filenames: false

      - id: prettier-osml-vpc
        name: Prettier (osml-vpc)
        entry: bash -c 'cd lib/osml-vpc/cdk && npx prettier --write .'
        language: system
        files: ^lib/osml-vpc/cdk/.*\.(ts|tsx|js|jsx|json|yml|yaml|md)$
        exclude: (node_modules/|dist/|cdk\.out/)
        types: [file]
        pass_filenames: false

      - id: prettier-osml-apis
        name: Prettier (osml-apis)
        entry: bash -c 'cd lib/osml-apis/cdk && npx prettier --write .'
        language: system
        files: ^lib/osml-apis/cdk/.*\.(ts|tsx|js|jsx|json|yml|yaml|md)$
        exclude: (node_modules/|dist/|cdk\.out/)
        types: [file]
        pass_filenames: false

      - id: check-copyright
        name: Check for copyright
        entry: python .github/hooks/check-copyright.py
        language: system
        exclude: |
          (?x)^(
            ^\..+|
            .+\.md$|
            .+\.json$|
            .+\.ya?ml$|
            .+\.config\.js$|
            .+\.config\.mjs$|
            eslint\.config\.mjs$|
            jest\.config\.ts$|
            .+\.lock$|
            .*/node_modules/.*|
            .*/cdk\.out/.*|
            .*/dist/.*|
            .*/\.tox/.*|
            .*/\.next/.*|
            LICENSE|
            bin/.*\.json\.example|
            lib/.*/cdk/cdk\.json|
            lib/.*/cdk/cdk\.context\.json|
            lib/.*/cdk/\.prettierrc|
            lib/.*/cdk/\.prettierignore|
            lib/.*/cdk/tsconfig\.json|
            lib/.*/cdk/package\.json|
            lib/.*/cdk/package-lock\.json|
            lib/.*/cdk/bin/deployment/.*\.json\.example|
            lib/.*/cdk/.*\.gitkeep|
            lib/.*/cdk/.*/requirements\.txt|
          )$
