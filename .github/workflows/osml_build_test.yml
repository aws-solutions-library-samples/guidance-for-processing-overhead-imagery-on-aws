name: 'Build and Test OSML'

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment (maps to branch-keyed secrets)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - main
  pull_request:
    branches:
      - dev
      - main

env:
  AWS_REGION: "us-west-2"
  AWS_PAGER: ""

permissions:
  id-token: write
  contents: read

jobs:
  CheckPendingWorkflow:
    runs-on: ubuntu-latest
    steps:
    - uses: ahmadnassri/action-workflow-queue@v1
      with:
        delay: 300000
        timeout: 7200000

  Lint:
    needs: CheckPendingWorkflow
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Install npm dependencies
        run: |
          npm ci
          cd lib/osml-vpc/cdk && npm ci
          cd ../../../lib/osml-apis/cdk && npm ci

      - name: Run pre-commit on changed files
        run: pre-commit run --from-ref origin/${{ github.base_ref || inputs.target_env }} --to-ref HEAD

  BuildAndTest:
    needs: CheckPendingWorkflow
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd lib/osml-vpc/cdk && npm ci
          cd ../../../lib/osml-apis/cdk && npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  DeployOSML:
    needs: [ Lint, BuildAndTest ]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::${{ (github.base_ref == 'main' || inputs.target_env == 'main') && secrets.OSML_MAIN || secrets.OSML_DEV }}:role/GithubAction-AssumeRoleWithAction
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          role-duration-seconds: 14400
      - name: Deploy OSML
        uses: aws-actions/aws-codebuild-run-build@v1
        with:
          project-name: CodeBuild-BuildGithubOSML
          buildspec-override: .github/codebuild/deploy.yml
          env-vars-for-codebuild: |
            BASE_REF,
            AWS_REGION,
            AWS_ACCOUNT,
            DOMAIN_HOSTED_ZONE_ID,
            DOMAIN_HOSTED_ZONE_NAME
        env:
          BASE_REF: ${{ github.base_ref || inputs.target_env }}
          AWS_ACCOUNT: ${{ (github.base_ref == 'main' || inputs.target_env == 'main') && secrets.OSML_MAIN || secrets.OSML_DEV }}
          DOMAIN_HOSTED_ZONE_ID: ${{ (github.base_ref == 'main' || inputs.target_env == 'main') && secrets.DOMAIN_HOSTED_ZONE_ID_MAIN || secrets.DOMAIN_HOSTED_ZONE_ID_DEV }}
          DOMAIN_HOSTED_ZONE_NAME: ${{ (github.base_ref == 'main' || inputs.target_env == 'main') && secrets.DOMAIN_HOSTED_ZONE_NAME_MAIN || secrets.DOMAIN_HOSTED_ZONE_NAME_DEV }}

  # Wave 1: Model Runner and Tile Server tests (parallel)
  RunModelRunnerIntegTest:
    runs-on: ubuntu-latest
    needs: DeployOSML
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::${{ (github.base_ref == 'main' || inputs.target_env == 'main') && secrets.OSML_MAIN || secrets.OSML_DEV }}:role/GithubAction-AssumeRoleWithAction
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
      - name: Model Runner Integration Tests
        uses: aws-actions/aws-codebuild-run-build@v1
        with:
          project-name: CodeBuild-TestGithubOSML
          buildspec-override: .github/codebuild/model_runner_test.yml

  RunTileServerIntegTest:
    runs-on: ubuntu-latest
    needs: DeployOSML
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::${{ (github.base_ref == 'main' || inputs.target_env == 'main') && secrets.OSML_MAIN || secrets.OSML_DEV }}:role/GithubAction-AssumeRoleWithAction
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
      - name: Tile Server Integration Tests
        uses: aws-actions/aws-codebuild-run-build@v1
        with:
          project-name: CodeBuild-TestGithubOSML
          buildspec-override: .github/codebuild/tile_server_test.yml

  # Wave 2: Geo Agents and Data Intake tests (parallel, after wave 1 completes)
  RunGeoAgentsIntegTest:
    runs-on: ubuntu-latest
    needs: [ RunModelRunnerIntegTest, RunTileServerIntegTest ]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::${{ (github.base_ref == 'main' || inputs.target_env == 'main') && secrets.OSML_MAIN || secrets.OSML_DEV }}:role/GithubAction-AssumeRoleWithAction
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
      - name: Geo Agents Integration Tests
        uses: aws-actions/aws-codebuild-run-build@v1
        with:
          project-name: CodeBuild-TestGithubOSML
          buildspec-override: .github/codebuild/geo_agents_test.yml

  RunDataIntakeIntegTest:
    runs-on: ubuntu-latest
    needs: [ RunModelRunnerIntegTest, RunTileServerIntegTest ]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::${{ (github.base_ref == 'main' || inputs.target_env == 'main') && secrets.OSML_MAIN || secrets.OSML_DEV }}:role/GithubAction-AssumeRoleWithAction
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
      - name: Data Intake Integration Tests
        uses: aws-actions/aws-codebuild-run-build@v1
        with:
          project-name: CodeBuild-TestGithubOSML
          buildspec-override: .github/codebuild/data_intake_test.yml

  DestroyOSML:
    if: ${{ always() && needs.CheckPendingWorkflow.result == 'success' && needs.DeployOSML.result != 'skipped' }}
    needs: [ CheckPendingWorkflow, DeployOSML, RunTileServerIntegTest, RunModelRunnerIntegTest, RunDataIntakeIntegTest, RunGeoAgentsIntegTest ]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::${{ (github.base_ref == 'main' || inputs.target_env == 'main') && secrets.OSML_MAIN || secrets.OSML_DEV }}:role/GithubAction-AssumeRoleWithAction
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          role-duration-seconds: 14400
      - name: Destroy OSML stack(s)
        uses: aws-actions/aws-codebuild-run-build@v1
        with:
          project-name: CodeBuild-DestroyGithubOSML
          buildspec-override: .github/codebuild/destroy.yml
          env-vars-for-codebuild: |
            BASE_REF,
            AWS_REGION,
            AWS_ACCOUNT,
            DOMAIN_HOSTED_ZONE_ID,
            DOMAIN_HOSTED_ZONE_NAME
        env:
          BASE_REF: ${{ github.base_ref || inputs.target_env }}
          AWS_ACCOUNT: ${{ (github.base_ref == 'main' || inputs.target_env == 'main') && secrets.OSML_MAIN || secrets.OSML_DEV }}
          DOMAIN_HOSTED_ZONE_ID: ${{ (github.base_ref == 'main' || inputs.target_env == 'main') && secrets.DOMAIN_HOSTED_ZONE_ID_MAIN || secrets.DOMAIN_HOSTED_ZONE_ID_DEV }}
          DOMAIN_HOSTED_ZONE_NAME: ${{ (github.base_ref == 'main' || inputs.target_env == 'main') && secrets.DOMAIN_HOSTED_ZONE_NAME_MAIN || secrets.DOMAIN_HOSTED_ZONE_NAME_DEV }}
